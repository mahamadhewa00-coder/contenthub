<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentHub | Discover Amazing Content</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* كود النافذة المنبثقة للفيديو */
        #videoModal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 10000; 
            justify-content: center; 
            align-items: center;
        }
        .modal-container {
            width: 80%;
            max-width: 900px;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            background: #ff4757;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
        }
        #videoFrame {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
        }
    </style>
</head>
<body>

    <div id="videoModal">
        <div class="modal-container">
            <button class="close-modal" onclick="closeVideo()">إغلاق</button>
            <iframe id="videoFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <header>
        <div class="container">
            <div class="logo">
                <span class="accent">Content</span>Hub
            </div>
            <nav>
                <a href="#home">Home</a>
                <a href="admin.html" class="admin-link">Admin</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="hero">
            <div class="container">
                <h1>Find your next <span class="accent">inspiration</span></h1>
                <p>A curated collection of resources, tools, and content.</p>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search by title, description or tags...">
                </div>
                <div id="tag-filters" class="tag-chips">
                    </div>
            </div>
        </section>

        <section id="content">
            <div class="container">
                <div id="loading-state" class="state">
                    <div class="spinner"></div>
                    <p>Loading amazing content...</p>
                </div>
                <div id="error-state" class="state hidden">
                    <i class="fas fa-exclamation-circle"></i>
                    <p>Oops! Something went wrong while fetching data.</p>
                    <button onclick="window.location.reload()">Try Again</button>
                </div>
                <div id="empty-state" class="state hidden">
                    <i class="fas fa-search-minus"></i>
                    <p>No results found for your search.</p>
                </div>
                <div id="card-grid" class="grid">
                    </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ContentHub. Built with <i class="fas fa-heart"></i></p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        // دالة إغلاق الفيديو
        function closeVideo() {
            document.getElementById('videoModal').style.display = 'none';
            document.getElementById('videoFrame').src = "";
        }
    </script>
</body>
</html>
