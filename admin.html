<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicNight Admin — Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a14;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #7c5cfc;
            --accent-glow: rgba(124, 92, 252, 0.4);
            --text: #f0f0f5;
            --muted: #7a7a9a;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* الخلفية المضيئة المتحركة */
        .glow-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            animation: float 12s infinite alternate;
        }
        .b1 { width: 500px; height: 500px; background: #4c1d95; top: -100px; left: -100px; }
        .b2 { width: 400px; height: 400px; background: #1e3a5f; bottom: -50px; right: -50px; animation-delay: 2s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px, 20px) scale(1.1); } }

        .hidden { display: none !important; }

        /* بوابة تسجيل الدخول */
        .login-gate {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .login-card h2 { font-family: 'Syne'; font-size: 28px; margin-bottom: 25px; color: #fff; }
        
        /* الحقول والأزرار الزجاجية */
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: var(--muted); }
        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: 0.3s;
        }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }
        .btn:hover { background: #6946ee; transform: translateY(-2px); box-shadow: 0 8px 20px var(--accent-glow); }

        /* لوحة التحكم الرئيسية */
        .admin-layout { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--surface-glass);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .admin-header h1 { font-family: 'Syne'; margin: 0; font-size: 26px; }
        .logout-btn { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: var(--danger); color: white; border-color: transparent; }

        /* الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: 18px; display: flex; align-items: center; gap: 20px; }
        .stat-icon { width: 50px; height: 50px; border-radius: 12px; background: rgba(124, 92, 252, 0.1); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .stat-info .num { font-size: 28px; font-weight: 700; font-family: 'Syne'; }
        .stat-info .lbl { font-size: 13px; color: var(--muted); margin-top: 4px; }

        /* شريط التفعيل والإضافة */
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; flex-wrap: wrap; }
        .search-box { position: relative; flex: 1; max-width: 350px; }
        .search-box i { position: absolute; left: 15px; top: 13px; color: var(--muted); }
        .search-box input { width: 100%; padding: 12px 15px 12px 42px; box-sizing: border-box; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: white; }
        .add-btn { background: var(--accent); border: none; padding: 12px 25px; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .add-btn:hover { background: #6946ee; transform: translateY(-1px); }

        /* قائمة المحتوى */
        .entry-list { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 10px; min-height: 200px; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .admin-item:last-child { border-bottom: none; }
        .admin-item:hover { background: rgba(255,255,255,0.01); }
        .item-meta { display: flex; align-items: center; gap: 15px; }
        .item-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .item-sub { font-size: 13px; color: var(--muted); }
        .item-actions { display: flex; gap: 10px; }
        .btn-sm { padding: 8px 14px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* القائمة الجانبية المرتفعة (Drawer) بتأثير زجاجي خرافي */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 999; opacity: 0; pointer-events: none; transition: 0.4s ease; }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }
        
        .drawer {
            position: fixed;
            top: 0;
            right: -460px;
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: rgba(13, 13, 26, 0.85);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--border);
            z-index: 1000;
            box-shadow: -10px 0 40px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .drawer.open { transform: translateX(-460px); }

        .drawer-header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .drawer-header h3 { font-family: 'Syne'; margin: 0; font-size: 20px; }
        .close-drawer { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
        
        .drawer-body { padding: 25px; overflow-y: auto; flex: 1; box-sizing: border-box; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
        .drawer-body .form-control { padding: 12px 15px; }
        
        .drawer-footer { padding: 20px 25px; border-top: 1px solid var(--border); display: flex; gap: 15px; background: rgba(0,0,0,0.2); }

        /* مربع معاينة الغلاف */
        .image-preview-box {
            background: rgba(0,0,0,0.3);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-top: 8px;
        }
        .image-preview-box img { max-width: 100%; max-height: 140px; border-radius: 8px; object-fit: cover; }

        /* نافذة التأكيد الصغير الدائرية للسڕینەوە */
        .confirm-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .confirm-card { background: #131324; border: 1px solid var(--border); padding: 30px; border-radius: 20px; max-width: 350px; text-align: center; }
        .confirm-card h4 { font-family: 'Syne'; margin: 0 0 15px 0; font-size: 20px; }
        .confirm-flex { display: flex; gap: 15px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="glow-bg">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
    </div>

    <section class="login-gate" id="login-gate">
        <div class="login-card">
            <h2>ComicNight Panel</h2>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="admin-password" class="form-control" placeholder="Enter Secure Password...">
            </div>
            <button class="btn" id="login-btn">Verify and Access</button>
            <p id="login-error" class="hidden" style="color:var(--danger); font-size:13px; margin-top:15px;"><i class="fas fa-exclamation-triangle"></i> Incorrect Access Key!</p>
        </div>
    </section>

    <main class="admin-layout hidden" id="admin-panel">
        <header class="admin-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <span style="font-size:28px;">🔮</span>
                <h1>ComicNight Admin Panel</h1>
            </div>
            <button class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-book-open"></i></div>
                <div class="stat-info">
                    <div class="num" id="stat-total">0</div>
                    <div class="lbl">Total Comics</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-calendar-day"></i></div>
                <div class="stat-info">
                    <div class="num" id="stat-today">0</div>
                    <div class="lbl">Added Today</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color:var(--success); background:rgba(16,185,129,0.1);"><i class="fas fa-database"></i></div>
                <div class="stat-info">
                    <div class="num" style="font-size:20px; color:var(--success);">Live</div>
                    <div class="lbl">Database Status</div>
                </div>
            </div>
        </section>

        <div class="action-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="admin-search" placeholder="Search entries...">
            </div>
            <button class="add-btn" id="add-entry-btn"><i class="fas fa-plus"></i> Add New Comic</button>
        </div>

        <section class="entry-list" id="admin-entry-list">
            <div style="text-align:center; padding:40px; color:var(--muted);">Connecting and fetching records...</div>
        </section>
    </main>

    <div class="drawer-overlay" id="form-overlay"></div>
    <div class="drawer" id="entry-drawer">
        <div class="drawer-header">
            <h3 id="drawer-title">Add New Comic</h3>
            <button class="close-drawer" id="close-drawer">&times;</button>
        </div>
        <div class="drawer-body">
            <form id="entry-form">
                <input type="hidden" id="entry-id">
                
                <div class="form-group">
                    <label>Comic / Manga Title</label>
                    <input type="text" id="form-title" class="form-control" style="padding:12px 15px;" required placeholder="e.g., Solo Leveling">
                </div>

                <div class="form-group">
                    <label>Chronique / Description</label>
                    <textarea id="form-desc" class="form-control" style="padding:12px 15px; height:80px; resize:none;" placeholder="Write a summary about the comic..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Chapters Count</label>
                        <input type="number" id="form-chapters" class="form-control" style="padding:12px 15px;" placeholder="210">
                    </div>
                    <div class="form-group">
                        <label>Volumes Count</label>
                        <input type="number" id="form-volumes" class="form-control" style="padding:12px 15px;" placeholder="14">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Rating (0 - 5)</label>
                        <input type="number" id="form-rating" step="0.1" class="form-control" style="padding:12px 15px;" placeholder="4.8">
                    </div>
                    <div class="form-group">
                        <label>Release Year</label>
                        <input type="number" id="form-year" class="form-control" style="padding:12px 15px;" placeholder="2026">
                    </div>
                </div>

                <div class="form-group">
                    <label>Read Online Link</label>
                    <input type="url" id="form-link" class="form-control" style="padding:12px 15px;" placeholder="https://example.com/read">
                </div>

                <div class="form-group">
                    <label>Tags (Comma separated)</label>
                    <input type="text" id="form-tags" class="form-control" style="padding:12px 15px;" placeholder="Action, Fantasy, Shonen">
                </div>

                <div class="form-row" style="display: none;">
                    <input type="text" id="form-emoji" value="📖">
                    <input type="text" id="form-bg" value="#12122c">
                </div>

                <div class="form-group">
                    <label>Cover Upload Image (Supabase Storage)</label>
                    <input type="file" id="form-image-file" accept="image/*" class="form-control" style="padding:10px;">
                    <div class="image-preview-box hidden" id="image-preview">
                        <img src="" id="preview-img" alt="Upload Preview">
                    </div>
                </div>
            </form>
        </div>
        <div class="drawer-footer">
            <button type="button" class="btn btn-secondary" id="cancel-btn" style="width:35%;">Cancel</button>
            <button type="submit" form="entry-form" class="btn" style="width:65%;">Save Entry</button>
        </div>
    </div>

    <div class="confirm-popup hidden" id="confirm-overlay">
        <div class="confirm-card">
            <div style="font-size:38px; color:var(--danger); margin-bottom:10px;"><i class="fas fa-trash-alt"></i></div>
            <h4>Are you absolutely sure?</h4>
            <p style="color:var(--muted); font-size:14px; margin:0;">This process cannot be undone. The comic data will be permanently wiped from Supabase.</p>
            <div class="confirm-flex">
                <button class="btn btn-secondary" id="cancel-delete-btn">No, Cancel</button>
                <button class="btn" style="background:var(--danger);" id="confirm-delete-btn">Yes, Delete</button>
            </div>
        </div>
    </div>

    <div id="toast-container" style="position:fixed; bottom:20px; right:20px; z-index:9999;"></div>

    <script src="admin.js"></script>
</body>
</html>
