<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicNight Admin | Manage Content</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="login-gate">
        <div class="login-card">
            <div class="logo"><span class="accent">Comic</span>Night Admin</div>
            <p>Please enter the administrator password</p>
            <input type="password" id="admin-password" placeholder="Password">
            <button id="login-btn">Login</button>
            <p id="login-error" class="error hidden">Invalid password</p>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <header>
            <div class="container">
                <div class="logo"><span class="accent">Comic</span>Night Admin</div>
                <div class="header-actions">
                    <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </header>

        <main class="container">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-label">Total Comics</div>
                    <div id="stat-total" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Added Today</div>
                    <div id="stat-today" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Database Status</div>
                    <div id="stat-files" class="stat-value" style="font-size: 18px; color: #10b981;">Live</div>
                </div>
            </div>

            <div class="storage-container">
                <div class="storage-header">
                    <span><i class="fas fa-cloud-upload-alt"></i> Supabase Storage Status</span>
                    <span id="storage-filename">comic-covers bucket</span>
                </div>
                <div class="progress-bar">
                    <div id="storage-progress" class="progress-fill" style="width: 100%; background: linear-gradient(90deg, #10b981, #3b82f6);"></div>
                </div>
                <div class="storage-footer">
                    <span id="storage-usage">Connected Successfully</span>
                    <span id="storage-percentage">Public Bucket Active</span>
                </div>
            </div>

            <div class="actions-row">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="admin-search" placeholder="Search comics...">
                </div>
                <button id="add-entry-btn" class="primary-btn"><i class="fas fa-plus"></i> Add New Comic</button>
            </div>

            <div id="admin-entry-list" class="entry-list">
                </div>
        </main>

        <button id="sticky-save-btn" class="sticky-btn">
            <i class="fas fa-sync"></i> Sync with Supabase
        </button>

        <div id="form-overlay" class="overlay hidden"></div>
        <div id="entry-drawer" class="drawer hidden">
            <div class="drawer-header">
                <h2 id="drawer-title">Add New Comic</h2>
                <button id="close-drawer" class="close-btn">&times;</button>
            </div>
            <form id="entry-form">
                <input type="hidden" id="entry-id">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="form-title" required placeholder="e.g. Solo Leveling">
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="form-desc" required rows="3" placeholder="Describe this comic or manga..."></textarea>
                </div>
                <div class="form-group">
                    <label>Comic Cover Image *</label>
                    <input type="file" id="form-image-file" accept="image/*">
                    <div id="image-preview" class="image-preview hidden" style="margin-top: 10px;">
                        <img id="preview-img" src="" alt="Preview" style="max-height: 150px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);">
                    </div>
                </div>
                <div class="form-group">
                    <label>Read Link URL</label>
                    <input type="url" id="form-link" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Tags (comma separated)</label>
                    <input type="text" id="form-tags" placeholder="Action, Shounen, Fantasy">
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Rating</label>
                        <input type="number" id="form-rating" step="0.1" placeholder="9.2">
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="form-year" placeholder="2026">
                    </div>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Emoji</label>
                        <input type="text" id="form-emoji" placeholder="📚">
                    </div>
                    <div class="form-group">
                        <label>Background (CSS Gradient)</label>
                        <input type="text" id="form-bg" placeholder="linear-gradient(...)">
                    </div>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Chapters</label>
                        <input type="number" id="form-chapters" placeholder="150">
                    </div>
                    <div class="form-group">
                        <label>Volumes</label>
                        <input type="number" id="form-volumes" placeholder="12">
                    </div>
                </div>

                <div class="form-actions" style="margin-top: 20px;">
                    <button type="submit" id="save-entry-btn" class="primary-btn">Save Entry</button>
                    <button type="button" id="cancel-btn" class="secondary-btn">Cancel</button>
                </div>
            </form>
        </div>

        <div id="confirm-overlay" class="overlay hidden" style="z-index: 2000;">
            <div class="confirm-dialog">
                <h3>Are you sure?</h3>
                <p>This action cannot be undone.</p>
                <div class="confirm-actions">
                    <button id="confirm-delete-btn" class="danger-btn">Delete</button>
                    <button id="cancel-delete-btn" class="secondary-btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
